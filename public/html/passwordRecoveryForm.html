<div
  style="width: 320px; margin: 0 auto; text-align: center; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px;">

  <h3 class='proHeavyFont' style="color: white; font-size: 50px; margin-bottom: 10px; margin-top: 0">Verify email</h3>

  <p class="proLightFont" style="color: white; font-size: 20px; margin-top: 0">Enter your email and we'll send you a
    code to reset your password</p>

  <input class='proLightFont' type="email" name="email" placeholder="Email" id="email"
    style="width: 90%; padding: 10px; margin-top: 10px; margin-bottom: 10px; border-radius: 5px; border: none; font-size: 20px" />

  <p class="proLightFont" style="color: white; font-size: 20px; margin-top: 0">Got a recovery code? <a href="#"
      style="color: #0c82e5" id="linkToPasswordReset">Reset password</a></p>

  <button name="passwordRecoveryButton" class="proHeavyFont" id="passwordRecoveryButton"
    style="width: 100%; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-size:30px;  margin-top: 10px">
    Receive code
  </button>
</div>
