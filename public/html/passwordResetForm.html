<div
  style="width: 300px; margin: 0 auto; text-align: center; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px;">

  <h3 class='proHeavyFont' style="color: white; font-size: 50px; margin-bottom: 10px; margin-top: 0">Reset Password</h3>

  <input class='proLightFont' type="text" name="recoveryCode" placeholder="Recovery code" id="recoveryCode"
    style="width: 90%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: none; font-size: 20px" />

  <input class='proLightFont' type="password" name="password" placeholder="New password" id="password"
    style="width: 90%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: none; font-size: 20px" />

  <input class='proLightFont' type="password" name="password" placeholder="Confirm password" id="passwordConfirm"
    style="width: 90%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: none; font-size: 20px" />

  <div class="proLightFont" style="color: red; font-size: 23px; margin-bottom: 10px; display: none;"
    id="passwordResetError">
  </div>

  <button name="passwordResetButton" class="proHeavyFont" id="passwordResetButton"
    style="width: 100%; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-size:30px;  margin-top: 10px">
    Reset password
  </button>
</div>
